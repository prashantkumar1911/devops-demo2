name: Build Project

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: |
          java -version
          javac -version

      - name: Allow Execute Permission
        run: chmod +x mvnw

      - name: Build Artifact
        run: ./mvnw clean package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-demo2-jar
          path: target/*.jar
          retention-days: 7